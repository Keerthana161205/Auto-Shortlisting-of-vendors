<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Vendor | BHEL</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 400px;
            border-top: 6px solid #00529b; /* BHEL Blue */
        }
        h2 { color: #00529b; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; color: #333; font-size: 14px; }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 18px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            background-color: #00529b;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
        }
        .btn:hover { background-color: #003d73; }
        .link { margin-top: 15px; text-decoration: none; color: #00529b; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add New Vendor</h2>
        <form method="POST">
            <label>Vendor Name</label>
            <input type="text" name="name" placeholder="Enter name" required>
            
            <label>Rating (1-5)</label>
            <input type="number" step="0.1" name="rating" placeholder="e.g. 4.5" required>
            
            <label>Current Workload</label>
            <input type="number" name="load" placeholder="Total orders" required>
            
            <label>Delivery Date</label>
            <input type="date" name="delivery_date" required>
            
            <label>Machine Type</label>
            <input type="text" name="machine_type" placeholder="e.g. CNC Lathe" required>
            
            <label>Contact Phone</label>
            <input type="text" name="phone" required>
            
            <label>Email Address</label>
            <input type="email" name="email" required>
            
            <button type="submit" class="btn">Register Vendor</button>
        </form>
    </div>
    <a href="/vendor_list" class="link">← Back to Shortlist Dashboard</a>
</body>
</html>
